    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onloadend = () => setImagePreview(reader.result);
      reader.readAsDataURL(file);
    }
  };

  const callAPI = async (systemPrompt, userMessage, imageBase64 = null) => {
    if (!apiKey) { setShowSettings(true); return { error: 'Vui lòng nhập API Key' }; }
    setLoading(true);
    try {
      let messages;
      if (imageBase64) {
        const base64Data = imageBase64.split(',')[1];
        const mediaType = imageBase64.split(';')[0].split(':')[1];
        messages = [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
          { type: "text", text: userMessage }
        ]}];
      } else {
        messages = [{ role: "user", content: userMessage }];
      }
      
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({ model: CONFIG.MODEL, max_tokens: CONFIG.MAX_TOKENS, system: systemPrompt, messages })
      });
      const data = await response.json();
      if (data.error) return { error: data.error.message };
      return { text: data.content?.[0]?.text || '' };
    } catch (error) {
      return { error: 'Lỗi kết nối.' };
    } finally {
      setLoading(false);

    { id: 'image', icon: Icons.Image, label: 'Check Ảnh', color: 'from-pink-500 to-rose-500' },
    { id: 'generate', icon: Icons.Sparkle, label: 'Tạo Content', color: 'from-purple-500 to-violet-500' },
    { id: 'promo', icon: Icons.Gift, label: 'Check KM', color: 'from-orange-500 to-amber-500' },
    { id: 'ask', icon: Icons.Question, label: 'Hỏi KM', color: 'from-cyan-500 to-blue-500' },
    { id: 'rules', icon: Icons.File, label: 'Guidelines', color: 'from-slate-500 to-gray-500' },
  ];

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
      <div className="fixed inset-0 overflow-hidden pointer-events-none">
        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl" />
        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl" />
      </div>

      <div className="relative z-10 max-w-6xl mx-auto px-4 py-5">
        {/* Header */}
        <header className="flex items-center justify-between mb-5">
          <div className="flex items-center gap-3">
            <div className="w-11 h-11 rounded-xl bg-gradient-to-br from-purple-500 to-cyan-500 flex items-center justify-center text-xl">🚀</div>
            <div>
              <h1 className="text-xl font-bold gradient-text">Digital Content AI Agent</h1>
              <p className="text-slate-400 text-xs">GGG 2026 Pro • Full Features</p>
            </div>
          </div>
          <button onClick={() => setShowSettings(!showSettings)} className="p-2 bg-slate-800 rounded-lg hover:bg-slate-700">
            <Icons.Settings />
          </button>
        </header>

        {showSettings && (
          <div className="mb-5 p-4 bg-slate-800/50 border border-slate-700 rounded-xl">
            <h3 className="font-semibold mb-3">⚙️ API Key</h3>
            <div className="flex gap-2">
              <input type="password" placeholder="sk-ant-xxxxx..." value={apiKey} onChange={(e) => setApiKey(e.target.value)}
                className="flex-1 px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" />
              <button onClick={saveApiKey} className="px-4 py-2 bg-purple-500 rounded-lg hover:bg-purple-600">Lưu</button>
            </div>
          </div>
        )}

        {/* Selectors */}
        <div className="flex flex-wrap justify-center gap-3 mb-5">
          <div className="relative">
            <button onClick={() => { setShowPlatformDD(!showPlatformDD); setShowBrandDD(false); }}
              className="flex items-center gap-2 px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl hover:border-purple-500/50">
              <span>{currentPlatform?.icon}</span>
              <span className="text-sm">{currentPlatform?.name}</span>
              <Icons.ChevronDown />
            </button>
            {showPlatformDD && (
              <div className="absolute top-full left-0 mt-1 w-56 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 max-h-72 overflow-y-auto">
                {PLATFORMS.map(p => (
                  <button key={p.key} onClick={() => { setSelectedPlatform(p.key); setShowPlatformDD(false); setResult(null); }}
                    className={`w-full flex items-center gap-2 px-4 py-2 text-sm hover:bg-slate-700 ${selectedPlatform === p.key ? 'bg-purple-500/20' : ''}`}>
                    <span>{p.icon}</span> {p.name}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="relative">
            <button onClick={() => { setShowBrandDD(!showBrandDD); setShowPlatformDD(false); }}
              className="flex items-center gap-2 px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl" style={{ borderColor: currentBrand?.color + '40' }}>
              <span>{currentBrand?.icon}</span>
              <span className="text-sm">{currentBrand?.name}</span>
              <Icons.ChevronDown />
            </button>
            {showBrandDD && (
              <div className="absolute top-full left-0 mt-1 w-56 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 max-h-72 overflow-y-auto">
                {BRANDS.map(b => (
                  <button key={b.key} onClick={() => { setSelectedBrand(b.key); setShowBrandDD(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-slate-700 ${selectedBrand === b.key ? 'bg-pink-500/20' : ''}`}>
                    <span className="text-lg">{b.icon}</span>
                    <div className="text-left">
                      <div className="font-medium">{b.name}</div>
                      <div className="text-xs text-slate-400 truncate w-36">{b.tone}</div>
                    </div>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Tabs */}
        <div className="flex flex-wrap justify-center gap-2 mb-5">
          {tabs.map(tab => (
            <button key={tab.id} onClick={() => { setActiveTab(tab.id); setResult(null); }}
              className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm transition-all ${
                activeTab === tab.id ? `bg-gradient-to-r ${tab.color} text-white shadow-lg` : 'bg-slate-800/50 text-slate-300 hover:bg-slate-700/50'
              }`}>
              <tab.icon /> {tab.label}
            </button>
          ))}
        </div>

        {/* Main Grid */}
        <div className="grid lg:grid-cols-2 gap-5">
          {/* Input */}
          <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
            {(activeTab === 'check' || activeTab === 'generate' || activeTab === 'promo') && (
              <>
                <div className="mb-3 flex items-center gap-2 px-3 py-1.5 bg-slate-900/50 rounded-lg w-fit" style={{ borderLeft: `3px solid ${currentBrand.color}` }}>
                  <span>{currentBrand.icon}</span>
                  <span className="text-xs text-slate-300">{currentBrand.name} • {currentPlatform.name}</span>
                </div>
                <textarea value={content} onChange={(e) => setContent(e.target.value)}
                  placeholder={
                    activeTab === 'check' ? "Dán content cần kiểm tra..." : 
                    activeTab === 'promo' ? "Dán nội dung chương trình KM cần check..." :
                    `Brief cho ${currentBrand.name}...\n\n- Chương trình: ...\n- Ưu đãi: ...\n- CTA mong muốn: ...`
                  }
                  className="w-full h-40 bg-slate-900/50 border border-slate-600 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-purple-500" />
              </>
            )}

            {activeTab === 'image' && (
              <div>
                {!imagePreview ? (
                  <div className="drop-zone rounded-xl p-8 text-center cursor-pointer" onClick={() => fileInputRef.current?.click()}>
                    <Icons.Upload />
                    <p className="text-slate-300 text-sm mt-2">Kéo thả hoặc click chọn ảnh</p>
                    <input ref={fileInputRef} type="file" accept="image/*" onChange={(e) => handleImageSelect(e.target.files[0])} className="hidden" />
                  </div>
                ) : (
                  <div className="relative">
                    <img src={imagePreview} alt="Preview" className="w-full h-40 object-contain bg-slate-900 rounded-xl" />
                    <button onClick={() => setImagePreview(null)} className="absolute top-2 right-2 p-1 bg-red-500 rounded-full"><Icons.X /></button>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'ask' && (
              <div>
                <p className="text-sm text-slate-400 mb-3">💬 Hỏi về chương trình KM, G-Coin, Ví, Đặt bàn...</p>
                <textarea value={promotionQuery} onChange={(e) => setPromotionQuery(e.target.value)}
                  placeholder="VD: Có chương trình gì cho sinh nhật không? / Đổi G-Coin như nào? / Thả ví được gì?"
                  className="w-full h-32 bg-slate-900/50 border border-slate-600 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-cyan-500" />
              </div>
            )}

            {activeTab === 'rules' && (
              <div className="bg-slate-900/50 border border-slate-600 rounded-xl p-6 text-center">
                <span className="text-4xl">{currentPlatform?.icon}</span>
                <p className="text-slate-300 mt-3 text-sm">Xem guidelines cho <strong>{currentPlatform?.name}</strong></p>
              </div>
            )}

            <button onClick={() => {
                if (activeTab === 'check') handleCheckText();
                else if (activeTab === 'image') handleCheckImage();
                else if (activeTab === 'generate') handleGenerate();
                else if (activeTab === 'promo') handleCheckPromotion();
                else if (activeTab === 'ask') handleAskPromotion();
                else handleViewRules();
              }}
              disabled={loading || (['check', 'generate', 'promo'].includes(activeTab) && !content.trim()) || (activeTab === 'image' && !imagePreview) || (activeTab === 'ask' && !promotionQuery.trim())}
              className={`w-full mt-4 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2 ${
                loading ? 'bg-slate-700 text-slate-400' : 'bg-gradient-to-r from-purple-500 to-cyan-500 hover:shadow-lg'
              }`}>
              {loading ? <><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Đang xử lý...</> :
                <>
                  {activeTab === 'check' && <><Icons.Check /> Kiểm tra</>}
                  {activeTab === 'image' && <><Icons.Image /> Kiểm tra Ảnh</>}
                  {activeTab === 'generate' && <><Icons.Sparkle /> Tạo Content</>}
                  {activeTab === 'promo' && <><Icons.Gift /> Check KM</>}
                  {activeTab === 'ask' && <><Icons.Question /> Hỏi ngay</>}
                  {activeTab === 'rules' && <><Icons.File /> Xem Guidelines</>}
                </>
              }
            </button>
          </div>

          {/* Result */}
          <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
            <h2 className="text-sm font-semibold mb-3 flex items-center gap-2"><Icons.Bulb /> Kết quả</h2>

            {!result && !loading && <div className="h-40 flex items-center justify-center text-slate-500 text-sm">Kết quả sẽ hiển thị ở đây</div>}
            {loading && <div className="h-40 flex items-center justify-center"><div className="w-8 h-8 border-3 border-purple-500 border-t-transparent rounded-full animate-spin"></div></div>}
            {result?.type === 'error' && <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400">❌ {result.data}</div>}

            {(result?.type === 'check' || result?.type === 'image' || result?.type === 'promo') && (
              <div className="space-y-3 max-h-96 overflow-y-auto pr-1">
                {result.data.score !== undefined && (
                  <div className="text-center py-3 bg-slate-900/50 rounded-xl">
                    <svg className="w-20 h-20 mx-auto transform -rotate-90">
                      <circle cx="40" cy="40" r="34" fill="none" stroke="#374151" strokeWidth="5" />
                      <circle cx="40" cy="40" r="34" fill="none" stroke={getScoreColor(result.data.score)} strokeWidth="5"
                        strokeDasharray={`${(result.data.score / 100) * 214} 214`} strokeLinecap="round" />
                    </svg>
                    <span className="text-xl font-bold" style={{ color: getScoreColor(result.data.score) }}>{result.data.score}</span>
                  </div>
                )}

                {result.data.matchedPromo && (
                  <div className="p-2 bg-orange-500/10 text-orange-400 rounded-lg text-xs">
                    🎁 Khớp với: <strong>{result.data.matchedPromo}</strong>
                  </div>
                )}

                {result.data.brandVoiceFeedback && (
                  <div className={`p-2 rounded-lg text-xs ${result.data.brandVoiceMatch ? 'bg-green-500/10 text-green-400' : 'bg-yellow-500/10 text-yellow-400'}`}>
                    {result.data.brandVoiceMatch ? '✓' : '⚠'} Brand Voice: {result.data.brandVoiceFeedback}
                  </div>
                )}

                {result.data.summary && <div className="p-2 bg-slate-900/50 rounded-lg text-xs text-slate-300">{result.data.summary}</div>}

                {result.data.passed?.length > 0 && (
                  <div className="p-2 bg-green-500/10 border border-green-500/30 rounded-lg">
                    {result.data.passed.map((item, i) => <div key={i} className="text-xs text-green-300">{item}</div>)}
                  </div>
                )}

                {result.data.failed?.length > 0 && (
                  <div className="p-2 bg-red-500/10 border border-red-500/30 rounded-lg">
                    {result.data.failed.map((item, i) => <div key={i} className="text-xs text-red-300">{item}</div>)}
                  </div>
                )}

                {result.data.suggestions?.length > 0 && (
                  <div className="p-2 bg-yellow-500/10 border border-yellow-500/30 rounded-lg">
                    {result.data.suggestions.map((item, i) => <div key={i} className="text-xs text-yellow-300">{item}</div>)}
                  </div>
                )}

                {result.data.suggestedCTAs && (
                  <div className="p-3 bg-purple-500/10 border border-purple-500/30 rounded-lg">
                    <div className="text-xs text-purple-400 font-medium mb-2">📱 CTA Gợi ý:</div>
                    <div className="text-xs text-purple-300 mb-1">App: {result.data.suggestedCTAs.app}</div>
                    <div className="text-xs text-purple-300">Ví: {result.data.suggestedCTAs.wallet}</div>
                  </div>
                )}
              </div>
            )}

            {result?.type === 'generate' && (
              <div className="space-y-3">
                <div className="bg-slate-900/50 rounded-xl p-4 max-h-64 overflow-y-auto">
                  <pre className="whitespace-pre-wrap text-sm text-slate-200 font-sans">{result.data}</pre>
                </div>
                <button onClick={() => copyText(result.data)} className="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm flex items-center justify-center gap-2">
                  <Icons.Copy /> Copy
                </button>
              </div>
            )}

            {result?.type === 'ask' && (
              <div className="bg-slate-900/50 rounded-xl p-4 max-h-80 overflow-y-auto">
                <pre className="whitespace-pre-wrap text-sm text-slate-200 font-sans">{result.data}</pre>
              </div>
            )}

            {result?.type === 'rules' && (
              <div className="space-y-3 max-h-80 overflow-y-auto">
                <div className="p-3 bg-slate-900/50 rounded-xl">
                  <div className="text-xs font-medium text-purple-400 mb-2">📝 Text</div>
                  <pre className="whitespace-pre-wrap text-xs text-slate-300 font-mono">{result.data.text}</pre>
                </div>
                {result.data.visual && (
                  <div className="p-3 bg-slate-900/50 rounded-xl">
                    <div className="text-xs font-medium text-pink-400 mb-2">🖼️ Visual</div>
                    <pre className="whitespace-pre-wrap text-xs text-slate-300 font-mono">{result.data.visual}</pre>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        <footer className="text-center mt-6 text-slate-500 text-xs">
          <p>Digital Content AI Agent Pro • Golden Gate Group 2026</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
