function App() {
  const [activeTab, setActiveTab] = React.useState('check');

  const [showPlatformDD, setShowPlatformDD] = React.useState(false);
  const [showBrandDD, setShowBrandDD] = React.useState(false);

  const [showSettings, setShowSettings] = React.useState(!localStorage.getItem('anthropic_api_key'));
  const [imagePreview, setImagePreview] = React.useState(null);
  const [promotionQuery, setPromotionQuery] = React.useState('');
  const fileInputRef = React.useRef(null);

  const currentPlatform = PLATFORMS.find(p => p.key === selectedPlatform);
  const currentBrand = BRANDS.find(b => b.key === selectedBrand);

  // Group brands by category
  const brandsByCategory = BRANDS.reduce((acc, brand) => {
    if (!acc[brand.category]) acc[brand.category] = [];
    acc[brand.category].push(brand);
    return acc;
  }, {});

  const saveApiKey = () => { localStorage.setItem('anthropic_api_key', apiKey); setShowSettings(false); };

  const handleImageSelect = (file) => {
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onloadend = () => setImagePreview(reader.result);
      reader.readAsDataURL(file);
    }
  };

  const callAPI = async (systemPrompt, userMessage, imageBase64 = null) => {
    if (!apiKey) { setShowSettings(true); return { error: 'Vui lòng nhập API Key' }; }
    setLoading(true);
    try {
      let messages;
      if (imageBase64) {
        const base64Data = imageBase64.split(',')[1];
        const mediaType = imageBase64.split(';')[0].split(':')[1];
        messages = [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } }, { type: "text", text: userMessage }]}];
      } else {
        messages = [{ role: "user", content: userMessage }];
      }
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: CONFIG.MODEL, max_tokens: CONFIG.MAX_TOKENS, system: systemPrompt, messages })
      });
      const data = await response.json();
      if (data.error) return { error: data.error.message };
      return { text: data.content?.[0]?.text || '' };
    } catch (error) { return { error: 'Lỗi kết nối.' }; }
    finally { setLoading(false); }
  };

  const handleCheckText = async () => {
    if (!content.trim()) return;
    const systemPrompt = `Bạn là chuyên gia Digital Marketing F&B Golden Gate Group.

PLATFORM: ${currentPlatform.name}
${currentPlatform.text}

BRAND: ${currentBrand.name} - ${currentBrand.tagline}
- Tone: ${currentBrand.tone}
- Keywords: ${currentBrand.keywords.join(', ')}
- Tránh: ${currentBrand.avoid.join(', ')}
- Emoji: ${currentBrand.emojiStyle}

Trả về JSON:
{"score": <0-100>, "passed": ["✓ điểm tốt"], "failed": ["✗ cần sửa"], "brandVoiceMatch": true/false, "brandVoiceFeedback": "nhận xét", "suggestions": ["💡 gợi ý"], "summary": "tổng quan"}`;
    const response = await callAPI(systemPrompt, `Kiểm tra content:\n\n${content}`);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    try { const json = response.text.match(/\{[\s\S]*\}/); setResult({ type: 'check', data: json ? JSON.parse(json[0]) : { summary: response.text } }); }
    catch { setResult({ type: 'check', data: { summary: response.text } }); }
  };

  const handleCheckImage = async () => {
    if (!imagePreview) return;
    if (!currentPlatform.visual) { setResult({ type: 'image', data: { summary: `${currentPlatform.name} không có visual guidelines.`, score: 0 } }); return; }
    const systemPrompt = `Bạn là chuyên gia thiết kế F&B.
PLATFORM: ${currentPlatform.name}
${currentPlatform.visual}
BRAND: ${currentBrand.name} - Màu: ${currentBrand.color}
Trả về JSON: {"score": <0-100>, "passed": ["✓ visual tốt"], "failed": ["✗ cần sửa"], "suggestions": ["💡 gợi ý"], "summary": "tổng quan"}`;
    const response = await callAPI(systemPrompt, `Phân tích visual theo guidelines`, imagePreview);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    try { const json = response.text.match(/\{[\s\S]*\}/); setResult({ type: 'image', data: json ? JSON.parse(json[0]) : { summary: response.text } }); }
    catch { setResult({ type: 'image', data: { summary: response.text } }); }
  };

  const handleGenerate = async () => {
    if (!content.trim()) return;
    const systemPrompt = `Bạn là copywriter F&B Golden Gate. Tạo content CHẤT LƯỢNG.

PLATFORM: ${currentPlatform.name}
${currentPlatform.text}

BRAND: ${currentBrand.name} - ${currentBrand.tagline}
- Tone: ${currentBrand.tone}
- Keywords: ${currentBrand.keywords.join(', ')}
- TRÁNH: ${currentBrand.avoid.join(', ')}
- Emoji: ${currentBrand.emojiStyle}

1. KHÔNG từ thừa (bỏ: thì, mà, rất)
2. HASHTAG: 3-5 cuối bài
3. EMOJI: max 3-5

5. CTA app nếu phù hợp: "Đặt bàn app", "Mở ví Golden Spoon"

Chỉ trả về content.`;
    const response = await callAPI(systemPrompt, `Tạo content ${currentPlatform.name}:\nBrief: ${content}`);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    setResult({ type: 'generate', data: response.text });
  };

  const handleCheckPromotion = async () => {
    if (!content.trim()) return;
    const promotionsInfo = PROMOTIONS.map(p => `- ${p.name} (${p.brand}): ${p.discount}. ${p.conditions}`).join('\n');
    const systemPrompt = `Bạn là chuyên gia marketing Golden Gate. Kiểm tra nội dung KM.

CHƯƠNG TRÌNH HIỆN TẠI:
${promotionsInfo}

BRAND: ${currentBrand.name}

Trả về JSON:
{"score": <0-100>, "isValid": true/false, "matchedPromo": "tên CT", "passed": ["✓ tốt"], "failed": ["✗ sửa"], "suggestions": ["💡 gợi ý CTA app/ví"], "suggestedCTAs": {"app": "CTA app", "wallet": "CTA ví"}, "summary": "tổng quan"}`;
    const response = await callAPI(systemPrompt, `Kiểm tra content KM:\n\n${content}`);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    try { const json = response.text.match(/\{[\s\S]*\}/); setResult({ type: 'promo', data: json ? JSON.parse(json[0]) : { summary: response.text } }); }
    catch { setResult({ type: 'promo', data: { summary: response.text } }); }
  };

  const handleAskPromotion = async () => {
    if (!promotionQuery.trim()) return;
    const promotionsInfo = PROMOTIONS.map(p => `- ${p.name} (${p.brand === 'all' ? 'Tất cả' : p.brand}): ${p.discount}. ĐK: ${p.conditions}`).join('\n');
    const systemPrompt = `Bạn là CSKH Golden Gate, am hiểu tất cả KM.

CHƯƠNG TRÌNH HIỆN TẠI:
${promotionsInfo}

TÍNH NĂNG APP:
- Đổi G-Coin: Tích điểm → đổi voucher
- Đặt bàn: Online, xác nhận tức thì
- Thả ví: Nạp tiền, nhận bonus (1tr→150k)
- Tích điểm: 10k = 1 G-Point, x2 khi dùng app

Trả lời thân thiện, gợi ý mở app/ví.`;
    const response = await callAPI(systemPrompt, promotionQuery);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    setResult({ type: 'ask', data: response.text });
  };

  const handleViewRules = () => { setResult({ type: 'rules', data: { text: currentPlatform?.text || '', visual: currentPlatform?.visual || '' } }); };

  const copyText = (t) => { navigator.clipboard.writeText(t); alert('Đã copy!'); };
  const getScoreColor = (s) => s >= 80 ? '#22C55E' : s >= 60 ? '#F59E0B' : s >= 40 ? '#F97316' : '#EF4444';

  const tabs = [
    { id: 'check', icon: Icons.Check, label: 'Check Text', color: 'from-green-500 to-emerald-500' },
    { id: 'image', icon: Icons.Image, label: 'Check Ảnh', color: 'from-pink-500 to-rose-500' },
    { id: 'generate', icon: Icons.Sparkle, label: 'Tạo Content', color: 'from-purple-500 to-violet-500' },
    { id: 'promo', icon: Icons.Gift, label: 'Check KM', color: 'from-orange-500 to-amber-500' },
    { id: 'ask', icon: Icons.Question, label: 'Hỏi KM', color: 'from-cyan-500 to-blue-500' },
    { id: 'rules', icon: Icons.File, label: 'Guidelines', color: 'from-slate-500 to-gray-500' },

    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">

      </div>

      <div className="relative z-10 max-w-6xl mx-auto px-4 py-5">
        <header className="flex items-center justify-between mb-5">
          <div className="flex items-center gap-3">
            <div className="w-11 h-11 rounded-xl bg-gradient-to-br from-purple-500 to-cyan-500 flex items-center justify-center text-xl font-bold">G</div>
            <div>
              <h1 className="text-xl font-bold gradient-text">Digital Content AI Agent</h1>
              <p className="text-slate-400 text-xs">GGG 2026 • 19 Thương hiệu • 11 Kênh</p>
            </div>
          </div>
          <button onClick={() => setShowSettings(!showSettings)} className="p-2 bg-slate-800 rounded-lg hover:bg-slate-700"><Icons.Settings /></button>
        </header>

        {showSettings && (
          <div className="mb-5 p-4 bg-slate-800/50 border border-slate-700 rounded-xl">
            <h3 className="font-semibold mb-3">⚙️ API Key</h3>
            <div className="flex gap-2">
              <input type="password" placeholder="sk-ant-xxxxx..." value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="flex-1 px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" />
              <button onClick={saveApiKey} className="px-4 py-2 bg-purple-500 rounded-lg hover:bg-purple-600">Lưu</button>
            </div>
          </div>
        )}

        {/* Selectors */}
        <div className="flex flex-wrap justify-center gap-3 mb-5">
          <div className="relative">
            <button onClick={() => { setShowPlatformDD(!showPlatformDD); setShowBrandDD(false); }} className="flex items-center gap-2 px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl hover:border-purple-500/50">
              <span className="text-sm font-medium">{currentPlatform?.name}</span><Icons.ChevronDown />
            </button>
            {showPlatformDD && (

                    {p.name}
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="relative">

                <textarea value={promotionQuery} onChange={(e) => setPromotionQuery(e.target.value)}
                  placeholder="VD: Có KM sinh nhật không? / Đổi G-Coin thế nào? / Thả ví được gì?"
                  className="w-full h-32 bg-slate-900/50 border border-slate-600 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-cyan-500" />
              </div>
            )}

            {activeTab === 'rules' && (
              <div className="bg-slate-900/50 border border-slate-600 rounded-xl p-6 text-center">
                <p className="text-slate-300 mt-3 text-sm">Guidelines cho <strong>{currentPlatform?.name}</strong></p>
              </div>
            )}

            <button onClick={() => {
                if (activeTab === 'check') handleCheckText();
                else if (activeTab === 'image') handleCheckImage();
                else if (activeTab === 'generate') handleGenerate();
                else if (activeTab === 'promo') handleCheckPromotion();
                else if (activeTab === 'ask') handleAskPromotion();
                else handleViewRules();
              }}
              disabled={loading || (['check', 'generate', 'promo'].includes(activeTab) && !content.trim()) || (activeTab === 'image' && !imagePreview) || (activeTab === 'ask' && !promotionQuery.trim())}
              className={`w-full mt-4 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2 ${loading ? 'bg-slate-700 text-slate-400' : 'bg-gradient-to-r from-purple-500 to-cyan-500 hover:shadow-lg'}`}>
              {loading ? <><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Đang xử lý...</> :
                <>{activeTab === 'check' && <><Icons.Check /> Kiểm tra</>}
                  {activeTab === 'image' && <><Icons.Image /> Check Ảnh</>}
                  {activeTab === 'generate' && <><Icons.Sparkle /> Tạo Content</>}
                  {activeTab === 'promo' && <><Icons.Gift /> Check KM</>}
                  {activeTab === 'ask' && <><Icons.Question /> Hỏi ngay</>}
                  {activeTab === 'rules' && <><Icons.File /> Xem Guidelines</>}</>}
            </button>
          </div>

          {/* Result */}
          <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
            <h2 className="text-sm font-semibold mb-3 flex items-center gap-2"><Icons.Bulb /> Kết quả</h2>

            {!result && !loading && <div className="h-40 flex items-center justify-center text-slate-500 text-sm">Kết quả hiển thị ở đây</div>}
            {loading && <div className="h-40 flex items-center justify-center"><div className="w-8 h-8 border-3 border-purple-500 border-t-transparent rounded-full animate-spin"></div></div>}
            {result?.type === 'error' && <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400">❌ {result.data}</div>}

            {(result?.type === 'check' || result?.type === 'image' || result?.type === 'promo') && (
              <div className="space-y-3 max-h-96 overflow-y-auto pr-1">
                {result.data.score !== undefined && (
                  <div className="text-center py-3 bg-slate-900/50 rounded-xl">
                    <svg className="w-20 h-20 mx-auto transform -rotate-90">
                      <circle cx="40" cy="40" r="34" fill="none" stroke="#374151" strokeWidth="5" />
                      <circle cx="40" cy="40" r="34" fill="none" stroke={getScoreColor(result.data.score)} strokeWidth="5" strokeDasharray={`${(result.data.score / 100) * 214} 214`} strokeLinecap="round" />
                    </svg>
                    <span className="text-xl font-bold" style={{ color: getScoreColor(result.data.score) }}>{result.data.score}</span>
                  </div>
                )}
                {result.data.matchedPromo && <div className="p-2 bg-orange-500/10 text-orange-400 rounded-lg text-xs">Khớp: <strong>{result.data.matchedPromo}</strong></div>}
                {result.data.brandVoiceFeedback && <div className={`p-2 rounded-lg text-xs ${result.data.brandVoiceMatch ? 'bg-green-500/10 text-green-400' : 'bg-yellow-500/10 text-yellow-400'}`}>{result.data.brandVoiceMatch ? '✓' : '⚠'} Brand Voice: {result.data.brandVoiceFeedback}</div>}
                {result.data.summary && <div className="p-2 bg-slate-900/50 rounded-lg text-xs text-slate-300">{result.data.summary}</div>}
                {result.data.passed?.length > 0 && <div className="p-2 bg-green-500/10 border border-green-500/30 rounded-lg">{result.data.passed.map((item, i) => <div key={i} className="text-xs text-green-300">{item}</div>)}</div>}
                {result.data.failed?.length > 0 && <div className="p-2 bg-red-500/10 border border-red-500/30 rounded-lg">{result.data.failed.map((item, i) => <div key={i} className="text-xs text-red-300">{item}</div>)}</div>}
                {result.data.suggestions?.length > 0 && <div className="p-2 bg-yellow-500/10 border border-yellow-500/30 rounded-lg">{result.data.suggestions.map((item, i) => <div key={i} className="text-xs text-yellow-300">{item}</div>)}</div>}
                {result.data.suggestedCTAs && (
                  <div className="p-3 bg-purple-500/10 border border-purple-500/30 rounded-lg">
                    <div className="text-xs text-purple-400 font-medium mb-2">CTA Gợi ý:</div>
                    <div className="text-xs text-purple-300 mb-1">App: {result.data.suggestedCTAs.app}</div>
                    <div className="text-xs text-purple-300">Ví: {result.data.suggestedCTAs.wallet}</div>
                  </div>
                )}
              </div>
            )}

            {result?.type === 'generate' && (
              <div className="space-y-3">
                <div className="bg-slate-900/50 rounded-xl p-4 max-h-64 overflow-y-auto"><pre className="whitespace-pre-wrap text-sm text-slate-200 font-sans">{result.data}</pre></div>
                <button onClick={() => copyText(result.data)} className="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm flex items-center justify-center gap-2"><Icons.Copy /> Copy</button>
              </div>
            )}

            {result?.type === 'ask' && <div className="bg-slate-900/50 rounded-xl p-4 max-h-80 overflow-y-auto"><pre className="whitespace-pre-wrap text-sm text-slate-200 font-sans">{result.data}</pre></div>}

            {result?.type === 'rules' && (
              <div className="space-y-3 max-h-80 overflow-y-auto">
                <div className="p-3 bg-slate-900/50 rounded-xl"><div className="text-xs font-medium text-purple-400 mb-2">Text Guidelines</div><pre className="whitespace-pre-wrap text-xs text-slate-300 font-mono">{result.data.text}</pre></div>
                {result.data.visual && <div className="p-3 bg-slate-900/50 rounded-xl"><div className="text-xs font-medium text-pink-400 mb-2">Visual Guidelines</div><pre className="whitespace-pre-wrap text-xs text-slate-300 font-mono">{result.data.visual}</pre></div>}
              </div>
            )}
          </div>
        </div>

        <footer className="text-center mt-6 text-slate-500 text-xs">
          <p>Digital Content AI Agent v3.0 • Golden Gate Group 2026</p>
          <p className="mt-1">19 Thương hiệu • 11 Kênh • Check Content • Check KM • Hỏi AI</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
