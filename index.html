// ============================================
// MAIN APP
// ============================================
function App() {
  const [brands, setBrands] = React.useState(() => {
    const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.BRANDS);
    return saved ? JSON.parse(saved) : DEFAULT_BRANDS;
  });
  const [platforms] = React.useState(DEFAULT_PLATFORMS);
  const [selectedPlatform, setSelectedPlatform] = React.useState('Facebook_Instagram');
  const [selectedBrand, setSelectedBrand] = React.useState('GoGi');
  const [content, setContent] = React.useState('');
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [showPlatformDD, setShowPlatformDD] = React.useState(false);
  const [showBrandDD, setShowBrandDD] = React.useState(false);
  const [apiKey, setApiKey] = React.useState(localStorage.getItem(CONFIG.STORAGE_KEYS.API_KEY) || '');
  const [showSettings, setShowSettings] = React.useState(!localStorage.getItem(CONFIG.STORAGE_KEYS.API_KEY));
  const [activeTab, setActiveTab] = React.useState('chat');
  
  // Chat states
  const [chatMessages, setChatMessages] = React.useState(() => {
    const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.CHAT_HISTORY);
    return saved ? JSON.parse(saved) : [];
  });
  const [chatInput, setChatInput] = React.useState('');
  
  // User profile
  const [userProfile, setUserProfile] = React.useState(() => {
    const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.USER_PROFILE);
    return saved ? JSON.parse(saved) : { name: '', department: '', role: '' };
  });
  const [showProfile, setShowProfile] = React.useState(false);
  
  // Learned data
  const [learnedData, setLearnedData] = React.useState(() => {
    const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.LEARNED_DATA);
    return saved ? JSON.parse(saved) : [];
  });
  
  // Brand management
  const [editingBrand, setEditingBrand] = React.useState(null);
  const [showBrandForm, setShowBrandForm] = React.useState(false);
  
  const chatEndRef = React.useRef(null);

  const currentPlatform = platforms.find(p => p.key === selectedPlatform);
  const currentBrand = brands.find(b => b.key === selectedBrand);

  const brandsByCategory = brands.reduce((acc, brand) => {
    if (!acc[brand.category]) acc[brand.category] = [];
    acc[brand.category].push(brand);
    return acc;
  }, {});

  // Save to localStorage
  React.useEffect(() => { localStorage.setItem(CONFIG.STORAGE_KEYS.BRANDS, JSON.stringify(brands)); }, [brands]);
  React.useEffect(() => { localStorage.setItem(CONFIG.STORAGE_KEYS.CHAT_HISTORY, JSON.stringify(chatMessages)); }, [chatMessages]);
  React.useEffect(() => { localStorage.setItem(CONFIG.STORAGE_KEYS.USER_PROFILE, JSON.stringify(userProfile)); }, [userProfile]);
  React.useEffect(() => { localStorage.setItem(CONFIG.STORAGE_KEYS.LEARNED_DATA, JSON.stringify(learnedData)); }, [learnedData]);
  React.useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);

  const saveApiKey = () => { localStorage.setItem(CONFIG.STORAGE_KEYS.API_KEY, apiKey); setShowSettings(false); };

  const buildLearnedContext = () => {
    if (learnedData.length === 0) return '';
    const goodExamples = learnedData.filter(d => d.feedback === 'good').slice(-10);
    const badExamples = learnedData.filter(d => d.feedback === 'bad').slice(-5);
    let context = '\n\n### DỮ LIỆU HỌC TỪ NHÂN VIÊN ###\n';
    if (goodExamples.length > 0) {
      context += '\n**Content được đánh giá tốt:**\n';
      goodExamples.forEach((d, i) => { context += `${i+1}. [${d.brand}] ${d.content.substring(0, 80)}...\n`; });
    }
    if (badExamples.length > 0) {
      context += '\n**Content cần tránh:**\n';
      badExamples.forEach((d, i) => { context += `${i+1}. [${d.brand}] ${d.content.substring(0, 80)}... - Lý do: ${d.note || 'Không phù hợp'}\n`; });
    }
    return context;
  };

  const callAPI = async (systemPrompt, userMessage) => {
    if (!apiKey) { setShowSettings(true); return { error: 'Vui lòng nhập API Key' }; }
    setLoading(true);
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json", 
          "x-api-key": apiKey, 
          "anthropic-version": "2023-06-01", 
          "anthropic-dangerous-direct-browser-access": "true" 
        },
        body: JSON.stringify({ 
          model: CONFIG.MODEL, 
          max_tokens: CONFIG.MAX_TOKENS, 
          system: systemPrompt, 
          messages: [{ role: "user", content: userMessage }] 
        })
      });
      const data = await response.json();
      console.log('API Response:', data);
      
      // Check for various error types
      if (data.error) {
        const errMsg = data.error.message || JSON.stringify(data.error);
        return { error: `API Error: ${errMsg}` };
      }
      if (data.type === 'error') {
        return { error: `Error: ${data.message || 'Unknown error'}` };
      }
      if (!response.ok) {
        return { error: `HTTP ${response.status}: ${data.message || 'Request failed'}` };
      }
      if (!data.content || !Array.isArray(data.content) || data.content.length === 0) {
        return { error: `Invalid response structure: ${JSON.stringify(data).substring(0, 200)}` };
      }
      
      const textContent = data.content.find(c => c.type === 'text');
      if (!textContent || !textContent.text) {
        return { error: 'No text content in response' };
      }
      
      return { text: textContent.text };
    } catch (error) { 
      console.error('API Call Error:', error);
      return { error: `Lỗi kết nối: ${error.message}` }; 
    }
    finally { setLoading(false); }
  };

  // Chat with AI
  const handleSendChat = async () => {
    if (!chatInput.trim() || loading) return;
    const userMsg = { role: 'user', content: chatInput, time: new Date().toISOString() };
    setChatMessages(prev => [...prev, userMsg]);
    setChatInput('');

    const brandsInfo = brands.map(b => `- ${b.name}: ${b.tagline} (${b.category})`).join('\n');
    const userContext = userProfile.name ? `\nNgười dùng: ${userProfile.name}, Phòng: ${userProfile.department}` : '';
    const learnedContext = buildLearnedContext();
    
    const systemPrompt = `Bạn là AI Assistant chuyên về Digital Marketing cho Golden Gate Group.
${userContext}

### THƯƠNG HIỆU GGG ###
${brandsInfo}

### TÍNH NĂNG APP GOLDEN SPOONS ###
- G-Coin: Tích điểm, đổi voucher
- Đặt bàn: Online, xác nhận tức thì
- Mở ví: Xem ưu đãi, thả ví nhận bonus (KHÔNG dùng "nạp ví")
- Tích điểm: 10k = 1 G-Point

### QUY TẮC CTA ###
- KHÔNG dùng "nạp ví" → dùng "mở ví", "thả ví"
- Ưu tiên hướng KH tải app trước
- CTA ngắn gọn, rõ ràng
${learnedContext}

Trả lời ngắn gọn, chuyên nghiệp. Format rõ ràng với xuống dòng. Không lạm dụng emoji.`;

    const recentHistory = chatMessages.slice(-6).map(m => `${m.role === 'user' ? 'User' : 'AI'}: ${m.content}`).join('\n');
    const fullMessage = recentHistory ? `${recentHistory}\nUser: ${chatInput}` : chatInput;

    const response = await callAPI(systemPrompt, fullMessage);
    const aiMsg = { role: 'assistant', content: response.error || response.text, time: new Date().toISOString() };
    setChatMessages(prev => [...prev, aiMsg]);
  };

  const handleFeedback = (messageIndex, feedback) => {
    const msg = chatMessages[messageIndex];
    if (msg.role !== 'assistant') return;
    const prevUserMsg = chatMessages[messageIndex - 1];
    const newLearnedData = {
      id: Date.now(),
      feedback,
      content: msg.content,
      query: prevUserMsg?.content || '',
      brand: selectedBrand,
      platform: selectedPlatform,
      user: userProfile.name,
      time: new Date().toISOString()
    };
    setLearnedData(prev => [...prev, newLearnedData]);
    setChatMessages(prev => prev.map((m, i) => i === messageIndex ? { ...m, rated: feedback } : m));
  };

  // Check content with improved output format
  const handleCheckContent = async () => {
    if (!content.trim()) return;
    const learnedContext = buildLearnedContext();
    
    const systemPrompt = `Bạn là chuyên gia Digital Marketing F&B Golden Gate Group.

### PLATFORM: ${currentPlatform.name} ###
${currentPlatform.text}

### BRAND: ${currentBrand.name} - ${currentBrand.tagline} ###
- Tone: ${currentBrand.tone}
- Keywords: ${currentBrand.keywords.join(', ')}
- Tránh: ${currentBrand.avoid.join(', ')}
- Emoji: ${currentBrand.emojiStyle}
${learnedContext}

### QUY TẮC KIỂM TRA ###
1. Kiểm tra CTA: KHÔNG được dùng "nạp ví" → phải là "mở ví", "thả ví", "tải app"
2. Kiểm tra độ dài theo platform
3. Kiểm tra tone phù hợp brand
4. Kiểm tra emoji không lạm dụng
5. Với ZNS: Không icon, không link trong nội dung, format theo template chuẩn

### OUTPUT FORMAT ###
Trả về JSON với format:
{
  "score": <0-100>,
  "summary": "Tóm tắt ngắn gọn 1-2 câu",
  "passed": [
    "Điểm tốt 1",
    "Điểm tốt 2"
  ],
  "failed": [
    "Lỗi 1 - Cần sửa: gợi ý cụ thể",
    "Lỗi 2 - Cần sửa: gợi ý cụ thể"
  ],
  "suggestions": [
    "Gợi ý cải thiện 1",
    "Gợi ý cải thiện 2"
  ],
  "brandVoiceMatch": true/false,
  "brandVoiceFeedback": "Nhận xét về brand voice",
  "revisedContent": "Nội dung đã sửa (nếu cần)"
}

LƯU Ý: Mỗi item trong passed/failed/suggestions là 1 câu ngắn gọn, xuống dòng riêng. KHÔNG dùng | để ngăn cách.`;

    const response = await callAPI(systemPrompt, `Kiểm tra content:\n\n${content}`);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    try { 
      const json = response.text.match(/\{[\s\S]*\}/); 
      setResult({ type: 'check', data: json ? JSON.parse(json[0]) : { summary: response.text } }); 
    }
    catch { setResult({ type: 'check', data: { summary: response.text } }); }
  };

  // Generate content with improved output
  const handleGenerate = async () => {
    if (!content.trim()) return;
    const learnedContext = buildLearnedContext();
    
    let platformSpecificRules = '';
    if (selectedPlatform === 'ZNS') {
      platformSpecificRules = `
### ZNS TEMPLATE FORMAT ###
Tạo content theo đúng cấu trúc ZNS:

TIÊU ĐỀ: [Max 65 ký tự]
---
ĐOẠN VĂN 1: [Max 400 ký tự, dùng biến số <ten_KH>, <ma_KH>...]
---
ĐOẠN VĂN 2 (nếu cần): [Thông tin bổ sung]
---
ĐOẠN VĂN 3: [Max 130 ký tự - hướng dẫn sử dụng]
---
CTA: [Max 30 ký tự]
---
LINK CTA: [Deeplink về ví/app]

QUY TẮC ZNS:
- KHÔNG icon, emoji
- KHÔNG link/SĐT trong nội dung
- Tiếng Việt có dấu
- Biến số: <ten_KH>, <ma_don_hang>, <ngay_het_han>...`;
    }

    const systemPrompt = `Bạn là copywriter F&B Golden Gate. Tạo content CHẤT LƯỢNG.

### PLATFORM: ${currentPlatform.name} ###
${currentPlatform.text}

### BRAND: ${currentBrand.name} - ${currentBrand.tagline} ###
- Tone: ${currentBrand.tone}
- Keywords: ${currentBrand.keywords.join(', ')}
- TRÁNH: ${currentBrand.avoid.join(', ')}
- Emoji: ${currentBrand.emojiStyle}
${platformSpecificRules}
${learnedContext}

### QUY TẮC CHUNG ###
1. KHÔNG dùng "nạp ví" → dùng "mở ví", "thả ví", "tải app"
2. CTA hướng đến: Tải app > Mở ví > Đặt bàn
3. Emoji tối thiểu, không lạm dụng
4. Format rõ ràng, xuống dòng đúng nghĩa
5. HASHTAG (nếu có): 3-5 cuối bài

Chỉ trả về content hoàn chỉnh, không giải thích thêm.`;

    const response = await callAPI(systemPrompt, `Tạo content cho ${currentPlatform.name}:\nBrief: ${content}`);
    if (response.error) { setResult({ type: 'error', data: response.error }); return; }
    setResult({ type: 'generate', data: response.text });
  };

  // Brand management
  const handleSaveBrand = (brandData) => {
    if (editingBrand) {
      setBrands(prev => prev.map(b => b.key === editingBrand.key ? { ...brandData, key: editingBrand.key } : b));
    } else {
      const newKey = brandData.name.replace(/\s+/g, '').replace(/[^a-zA-Z0-9]/g, '');
      setBrands(prev => [...prev, { ...brandData, key: newKey }]);
    }
    setShowBrandForm(false);
    setEditingBrand(null);
  };

  const handleDeleteBrand = (key) => {
    if (confirm('Xác nhận xóa brand này?')) {
      setBrands(prev => prev.filter(b => b.key !== key));
    }
  };

  const handleExportData = () => {
    const data = { brands, learnedData, exportTime: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `ggg-data-${Date.now()}.json`; a.click();
  };

  const handleImportData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.brands) setBrands(data.brands);
        if (data.learnedData) setLearnedData(data.learnedData);
        alert('Import thành công!');
      } catch { alert('File không hợp lệ!'); }
    };
    reader.readAsText(file);
  };

  const copyText = (t) => { navigator.clipboard.writeText(t); alert('Đã copy!'); };
  const getScoreColor = (s) => s >= 80 ? '#22C55E' : s >= 60 ? '#F59E0B' : s >= 40 ? '#F97316' : '#EF4444';

  const tabs = [
    { id: 'chat', icon: Icons.Chat, label: 'AI Chat', color: 'from-cyan-500 to-blue-500' },
    { id: 'check', icon: Icons.Check, label: 'Check', color: 'from-green-500 to-emerald-500' },
    { id: 'generate', icon: Icons.Sparkle, label: 'Tạo Content', color: 'from-purple-500 to-violet-500' },
    { id: 'brands', icon: Icons.Settings, label: 'Brands', color: 'from-orange-500 to-amber-500' },
    { id: 'learn', icon: Icons.Brain, label: 'Học', color: 'from-pink-500 to-rose-500' },
  ];

  // Brand Form Component
  const BrandForm = ({ brand, onSave, onCancel }) => {

    const [keywordsText, setKeywordsText] = React.useState((brand?.keywords || []).join(', '));
    const [avoidText, setAvoidText] = React.useState((brand?.avoid || []).join(', '));
    
    const handleSubmit = () => {
      if (!form.name.trim()) { alert('Vui lòng nhập tên brand'); return; }
      onSave({ ...form, keywords: keywordsText.split(',').map(k => k.trim()).filter(k => k), avoid: avoidText.split(',').map(k => k.trim()).filter(k => k) });
    };
    
    return (
      <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
          <h3 className="text-lg font-bold mb-4">{brand ? 'Sửa Brand' : 'Thêm Brand Mới'}</h3>
          <div className="space-y-4">
            <div>
              <label className="text-xs text-slate-400">Tên brand *</label>
              <input value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" placeholder="VD: GoGi House" />
            </div>
            <div>
              <label className="text-xs text-slate-400">Tagline</label>
              <input value={form.tagline} onChange={e => setForm({...form, tagline: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" placeholder="VD: Nướng Hàn Quốc" />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-400">Màu</label>
                <input type="color" value={form.color} onChange={e => setForm({...form, color: e.target.value})} className="w-full h-10 rounded-lg cursor-pointer" />
              </div>
              <div>
                <label className="text-xs text-slate-400">Danh mục</label>
                <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm">
                  <option>Lẩu</option><option>Nướng</option><option>Nhật</option><option>Châu Á</option><option>Beer</option><option>Đồ uống</option><option>Khác</option>
                </select>
              </div>
            </div>
            <div>
              <label className="text-xs text-slate-400">Tone & Voice</label>
              <textarea value={form.tone} onChange={e => setForm({...form, tone: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm h-16" placeholder="VD: Sang trọng, đẳng cấp" />
            </div>
            <div>
              <label className="text-xs text-slate-400">Keywords (phân cách bằng dấu phẩy)</label>
              <input value={keywordsText} onChange={e => setKeywordsText(e.target.value)} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" placeholder="thịt nướng, chuẩn Hàn" />
            </div>
            <div>
              <label className="text-xs text-slate-400">Từ cần tránh</label>
              <input value={avoidText} onChange={e => setAvoidText(e.target.value)} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" placeholder="bình dân, giá rẻ" />
            </div>
            <div>
              <label className="text-xs text-slate-400">Emoji Style</label>
              <select value={form.emojiStyle} onChange={e => setForm({...form, emojiStyle: e.target.value})} className="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm">
                <option>Tối thiểu (max 2)</option>
                <option>Tinh tế (2)</option>
                <option>Nhẹ nhàng (max 2)</option>
                <option>Vừa phải (2-3)</option>
                <option>Vui vẻ (3-4)</option>
                <option>Party (3-4)</option>
                <option>Trendy (2-3)</option>
                <option>Cute (2-3)</option>
              </select>
            </div>
          </div>
          <div className="flex gap-3 mt-6">
            <button onClick={onCancel} className="flex-1 py-2 bg-slate-700 rounded-lg hover:bg-slate-600">Hủy</button>
            <button onClick={handleSubmit} className="flex-1 py-2 bg-purple-500 rounded-lg hover:bg-purple-600">Lưu</button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
      <div className="fixed inset-0 overflow-hidden pointer-events-none">
        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl" />
        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl" />
      </div>

      <div className="relative z-10 max-w-6xl mx-auto px-4 py-4">
        {/* Header */}
        <header className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-cyan-500 flex items-center justify-center text-lg font-bold">G</div>
            <div>
              <h1 className="text-lg font-bold gradient-text">Digital Content AI Agent</h1>
              <p className="text-slate-400 text-xs">GGG 2026 Pro v5 | {brands.length} Brands | Guidelines 2025</p>
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setShowProfile(!showProfile)} className="p-2 bg-slate-800 rounded-lg hover:bg-slate-700" title="Hồ sơ"><Icons.User /></button>
            <button onClick={() => setShowSettings(!showSettings)} className="p-2 bg-slate-800 rounded-lg hover:bg-slate-700" title="API Key"><Icons.Settings /></button>
          </div>
        </header>

        {/* User Profile */}
        {showProfile && (
          <div className="mb-4 p-4 bg-slate-800/80 border border-slate-700 rounded-xl">
            <h3 className="font-semibold mb-3 flex items-center gap-2"><Icons.User /> Thông tin của bạn</h3>
            <div className="grid grid-cols-3 gap-3">
              <input placeholder="Họ tên" value={userProfile.name} onChange={e => setUserProfile({...userProfile, name: e.target.value})} className="px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" />
              <input placeholder="Phòng ban" value={userProfile.department} onChange={e => setUserProfile({...userProfile, department: e.target.value})} className="px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" />
              <input placeholder="Vị trí" value={userProfile.role} onChange={e => setUserProfile({...userProfile, role: e.target.value})} className="px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" />
            </div>
          </div>
        )}

        {/* Settings */}
        {showSettings && (
          <div className="mb-4 p-4 bg-slate-800/80 border border-slate-700 rounded-xl">
            <h3 className="font-semibold mb-3">API Key</h3>
            <div className="flex gap-2">
              <input type="password" placeholder="sk-ant-xxxxx..." value={apiKey} onChange={(e) => setApiKey(e.target.value)} className="flex-1 px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" />
              <button onClick={saveApiKey} className="px-4 py-2 bg-purple-500 rounded-lg hover:bg-purple-600">Lưu</button>
            </div>
          </div>
        )}

        {/* Tabs */}
        <div className="flex flex-wrap justify-center gap-2 mb-4">
          {tabs.map(tab => (
            <button key={tab.id} onClick={() => { setActiveTab(tab.id); setResult(null); }}
              className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm transition-all ${activeTab === tab.id ? `bg-gradient-to-r ${tab.color} text-white shadow-lg` : 'bg-slate-800/50 text-slate-300 hover:bg-slate-700/50'}`}>
              <tab.icon /> {tab.label}
            </button>
          ))}
        </div>

        {/* AI Chat Tab */}
        {activeTab === 'chat' && (
          <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl overflow-hidden">
            <div className="h-80 overflow-y-auto p-4 space-y-3">
              {chatMessages.length === 0 && (
                <div className="text-center text-slate-500 py-8">
                  <p>Xin chào! Tôi là AI Assistant của GGG.</p>
                  <p className="text-xs mt-1">Hỏi về brands, content, khuyến mãi, guidelines...</p>
                </div>
              )}
              {chatMessages.map((msg, i) => (
                <div key={i} className={`chat-bubble flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[80%] px-4 py-2 rounded-2xl ${msg.role === 'user' ? 'bg-purple-500 text-white' : 'bg-slate-700 text-slate-200'}`}>
                    <p className="text-sm whitespace-pre-wrap">{msg.content}</p>
                    {msg.role === 'assistant' && !msg.rated && (
                      <div className="flex gap-2 mt-2 pt-2 border-t border-slate-600">
                        <button onClick={() => handleFeedback(i, 'good')} className="text-xs text-slate-400 hover:text-green-400 flex items-center gap-1"><Icons.ThumbUp /> Tốt</button>
                        <button onClick={() => handleFeedback(i, 'bad')} className="text-xs text-slate-400 hover:text-red-400 flex items-center gap-1"><Icons.ThumbDown /> Chưa tốt</button>
                      </div>
                    )}
                    {msg.rated && <p className="text-xs text-slate-500 mt-1">Đã đánh giá: {msg.rated === 'good' ? 'Tốt' : 'Chưa tốt'}</p>}
                  </div>
                </div>
              ))}
              {loading && (
                <div className="flex justify-start">
                  <div className="bg-slate-700 px-4 py-3 rounded-2xl">
                    <div className="flex gap-1"><div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" /><div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.1s'}} /><div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}} /></div>
                  </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>
            <div className="p-4 border-t border-slate-700 flex gap-2">
              <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendChat()}
                placeholder="Hỏi về brands, content, guidelines..." className="flex-1 px-4 py-2 bg-slate-900 border border-slate-600 rounded-xl text-sm focus:outline-none focus:border-cyan-500" />
              <button onClick={handleSendChat} disabled={loading || !chatInput.trim()} className="px-4 py-2 bg-cyan-500 rounded-xl hover:bg-cyan-600 disabled:opacity-50"><Icons.Send /></button>
            </div>
            <div className="px-4 pb-4 flex flex-wrap gap-2">
              {['Guidelines ZNS?', 'Viết content GoGi', 'CTA chuẩn cho app?', 'Format FB post?'].map(q => (
                <button key={q} onClick={() => setChatInput(q)} className="text-xs px-3 py-1 bg-slate-700/50 rounded-full hover:bg-slate-600">{q}</button>
              ))}
              <button onClick={() => setChatMessages([])} className="text-xs px-3 py-1 bg-red-500/20 text-red-400 rounded-full hover:bg-red-500/30">Xóa chat</button>
            </div>
          </div>
        )}

        {/* Check/Generate Tab */}
        {(activeTab === 'check' || activeTab === 'generate') && (
          <div className="grid lg:grid-cols-2 gap-4">
            <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
              {/* Selectors */}
              <div className="flex flex-wrap gap-2 mb-4">
                <div className="relative">
                  <button onClick={() => { setShowPlatformDD(!showPlatformDD); setShowBrandDD(false); }} className="flex items-center gap-2 px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm">
                    {currentPlatform?.name}<Icons.ChevronDown />
                  </button>
                  {showPlatformDD && (
                    <div className="absolute top-full left-0 mt-1 w-48 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 max-h-60 overflow-y-auto">
                      {platforms.map(p => (
                        <button key={p.key} onClick={() => { setSelectedPlatform(p.key); setShowPlatformDD(false); }}
                          className={`w-full px-4 py-2 text-sm text-left hover:bg-slate-700 ${selectedPlatform === p.key ? 'bg-purple-500/20' : ''}`}>{p.name}</button>
                      ))}
                    </div>
                  )}
                </div>
                <div className="relative">
                  <button onClick={() => { setShowBrandDD(!showBrandDD); setShowPlatformDD(false); }} className="flex items-center gap-2 px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm" style={{ borderColor: currentBrand?.color + '60' }}>
                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: currentBrand?.color }}></div>
                    {currentBrand?.name}<Icons.ChevronDown />
                  </button>
                  {showBrandDD && (
                    <div className="absolute top-full left-0 mt-1 w-56 bg-slate-800 border border-slate-700 rounded-xl shadow-xl z-50 max-h-72 overflow-y-auto">
                      {Object.entries(brandsByCategory).map(([cat, bs]) => (
                        <div key={cat}>
                          <div className="px-3 py-1 text-xs text-slate-500 bg-slate-900/50">{cat}</div>
                          {bs.map(b => (
                            <button key={b.key} onClick={() => { setSelectedBrand(b.key); setShowBrandDD(false); }}
                              className={`w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-slate-700 ${selectedBrand === b.key ? 'bg-purple-500/20' : ''}`}>
                              <div className="w-2 h-2 rounded-full" style={{ backgroundColor: b.color }}></div>
                              {b.name}
                            </button>
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              
              <textarea value={content} onChange={(e) => setContent(e.target.value)}
                placeholder={activeTab === 'check' ? "Dán content cần kiểm tra..." : `Brief: Mô tả nội dung cần tạo cho ${currentBrand?.name}...`}
                className="w-full h-36 bg-slate-900/50 border border-slate-600 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-purple-500" />
              
              <button onClick={activeTab === 'check' ? handleCheckContent : handleGenerate} disabled={loading || !content.trim()}
                className={`w-full mt-4 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2 ${loading ? 'bg-slate-700' : 'bg-gradient-to-r from-purple-500 to-cyan-500 hover:shadow-lg'}`}>
                {loading ? 'Đang xử lý...' : activeTab === 'check' ? <><Icons.Check /> Kiểm tra</> : <><Icons.Sparkle /> Tạo Content</>}
              </button>
            </div>
            
            {/* Result Panel */}
            <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
              <h2 className="text-sm font-semibold mb-3 flex items-center gap-2"><Icons.Bulb /> Kết quả</h2>
              
              {!result && !loading && <div className="h-36 flex items-center justify-center text-slate-500 text-sm">Kết quả hiển thị ở đây</div>}
              
              {result?.type === 'error' && <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400">{result.data}</div>}
              
              {result?.type === 'check' && (
                <div className="space-y-3 max-h-96 overflow-y-auto pr-1">
                  {result.data.score !== undefined && (
                    <div className="text-center py-3 bg-slate-900/50 rounded-xl">
                      <div className="text-3xl font-bold" style={{ color: getScoreColor(result.data.score) }}>{result.data.score}/100</div>
                    </div>
                  )}
                  
                  {result.data.summary && (
                    <div className="p-3 bg-slate-900/50 rounded-lg text-sm">{result.data.summary}</div>
                  )}
                  
                  {result.data.brandVoiceFeedback && (
                    <div className={`p-3 rounded-lg text-sm ${result.data.brandVoiceMatch ? 'bg-green-500/10 text-green-300' : 'bg-yellow-500/10 text-yellow-300'}`}>
                      <strong>Brand Voice:</strong> {result.data.brandVoiceFeedback}
                    </div>
                  )}
                  
                  {result.data.passed?.length > 0 && (
                    <div className="p-3 bg-green-500/10 border border-green-500/20 rounded-lg">
                      <div className="text-xs font-semibold text-green-400 mb-2">Điểm tốt:</div>
                      {result.data.passed.map((item, i) => (
                        <div key={i} className="text-sm text-green-300 py-1 border-b border-green-500/10 last:border-0">{item}</div>
                      ))}
                    </div>
                  )}
                  
                  {result.data.failed?.length > 0 && (
                    <div className="p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
                      <div className="text-xs font-semibold text-red-400 mb-2">Cần sửa:</div>
                      {result.data.failed.map((item, i) => (
                        <div key={i} className="text-sm text-red-300 py-1 border-b border-red-500/10 last:border-0">{item}</div>
                      ))}
                    </div>
                  )}
                  
                  {result.data.suggestions?.length > 0 && (
                    <div className="p-3 bg-yellow-500/10 border border-yellow-500/20 rounded-lg">
                      <div className="text-xs font-semibold text-yellow-400 mb-2">Gợi ý:</div>
                      {result.data.suggestions.map((item, i) => (
                        <div key={i} className="text-sm text-yellow-300 py-1 border-b border-yellow-500/10 last:border-0">{item}</div>
                      ))}
                    </div>
                  )}
                  
                  {result.data.revisedContent && (
                    <div className="p-3 bg-purple-500/10 border border-purple-500/20 rounded-lg">
                      <div className="text-xs font-semibold text-purple-400 mb-2">Nội dung đã sửa:</div>
                      <pre className="text-sm text-purple-200 whitespace-pre-wrap">{result.data.revisedContent}</pre>
                      <button onClick={() => copyText(result.data.revisedContent)} className="mt-2 text-xs text-purple-400 hover:text-purple-300 flex items-center gap-1"><Icons.Copy /> Copy</button>
                    </div>
                  )}
                </div>
              )}
              
              {result?.type === 'generate' && (
                <div>
                  <div className="bg-slate-900/50 rounded-xl p-4 max-h-72 overflow-y-auto">
                    <pre className="whitespace-pre-wrap text-sm">{result.data}</pre>
                  </div>
                  <button onClick={() => copyText(result.data)} className="w-full mt-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm flex items-center justify-center gap-2"><Icons.Copy /> Copy</button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Brands Management Tab */}
        {activeTab === 'brands' && (
          <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-semibold">Quản lý Brands ({brands.length})</h2>
              <div className="flex gap-2">
                <button onClick={handleExportData} className="px-3 py-1.5 bg-slate-700 rounded-lg text-xs flex items-center gap-1"><Icons.Download /> Export</button>
                <label className="px-3 py-1.5 bg-slate-700 rounded-lg text-xs flex items-center gap-1 cursor-pointer">
                  <Icons.Upload /> Import
                  <input type="file" accept=".json" onChange={handleImportData} className="hidden" />
                </label>
                <button onClick={() => { setEditingBrand(null); setShowBrandForm(true); }} className="px-3 py-1.5 bg-purple-500 rounded-lg text-xs flex items-center gap-1"><Icons.Plus /> Thêm</button>
              </div>
            </div>
            <div className="grid gap-2 max-h-80 overflow-y-auto">
              {brands.map(b => (
                <div key={b.key} className="flex items-center gap-3 p-3 bg-slate-900/50 rounded-xl hover:bg-slate-900/80">
                  <div className="w-4 h-4 rounded-full flex-shrink-0" style={{ backgroundColor: b.color }}></div>
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-sm">{b.name}</div>
                    <div className="text-xs text-slate-400 truncate">{b.tagline} | {b.category}</div>
                  </div>
                  <div className="flex gap-1">
                    <button onClick={() => { setEditingBrand(b); setShowBrandForm(true); }} className="p-1.5 hover:bg-slate-700 rounded"><Icons.Edit /></button>
                    <button onClick={() => handleDeleteBrand(b.key)} className="p-1.5 hover:bg-red-500/20 text-red-400 rounded"><Icons.Trash /></button>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={() => setBrands(DEFAULT_BRANDS)} className="mt-4 text-xs text-slate-500 hover:text-slate-300">Reset về 19 brands mặc định</button>
          </div>
        )}

        {/* Learned Data Tab */}
        {activeTab === 'learn' && (
          <div className="bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-semibold flex items-center gap-2"><Icons.Brain /> Dữ liệu học ({learnedData.length})</h2>
              <button onClick={() => { if(confirm('Xóa tất cả?')) setLearnedData([]); }} className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-lg text-xs">Xóa tất cả</button>
            </div>
            {learnedData.length === 0 ? (
              <div className="text-center text-slate-500 py-8">
                <p>Chưa có dữ liệu học</p>
                <p className="text-xs mt-1">Sử dụng AI Chat và đánh giá để AI học từ feedback</p>
              </div>
            ) : (
              <div className="space-y-2 max-h-72 overflow-y-auto">
                {learnedData.slice().reverse().slice(0, 20).map(d => (
                  <div key={d.id} className={`p-3 rounded-xl ${d.feedback === 'good' ? 'bg-green-500/10 border border-green-500/20' : 'bg-red-500/10 border border-red-500/20'}`}>
                    <div className="flex items-center gap-2 mb-1">
                      <span className={d.feedback === 'good' ? 'text-green-400' : 'text-red-400'}>{d.feedback === 'good' ? 'Tốt' : 'Chưa tốt'}</span>
                      <span className="text-xs text-slate-400">{d.brand} | {new Date(d.time).toLocaleDateString('vi')}</span>
                    </div>
                    <p className="text-xs text-slate-300 line-clamp-2">{d.content.substring(0, 120)}...</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {showBrandForm && <BrandForm brand={editingBrand} onSave={handleSaveBrand} onCancel={() => { setShowBrandForm(false); setEditingBrand(null); }} />}

        <footer className="text-center mt-6 text-slate-500 text-xs">
          <p>Digital Content AI Agent v5.0 Pro | Golden Gate Group 2026</p>
          <p className="mt-1">{brands.length} Brands | Guidelines 2025 | ZNS Form chuẩn | AI Learning</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
